<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Oldschool red and blue pill favicon">
  <defs>
    <linearGradient id="pillRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8181"/>
      <stop offset="1" stop-color="#e43030"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93beff"/>
      <stop offset="1" stop-color="#2f62df"/>
    </linearGradient>
  </defs>

  <g transform="rotate(-24 24 32)">
    <rect x="1" y="21" width="39" height="22" rx="11" fill="url(#pillRed)"/>
    <rect x="19.8" y="21" width="2" height="22" fill="#ffd4d4" opacity="0.85"/>
    <rect x="8" y="25" width="10" height="4" rx="2" fill="#fff2f2" opacity="0.65"/>
  </g>

  <g transform="rotate(24 40 32)">
    <rect x="24" y="21" width="39" height="22" rx="11" fill="url(#pillBlue)"/>
    <rect x="42.8" y="21" width="2" height="22" fill="#d7e4ff" opacity="0.85"/>
    <rect x="31" y="25" width="10" height="4" rx="2" fill="#f4f7ff" opacity="0.65"/>
  </g>
</svg>
